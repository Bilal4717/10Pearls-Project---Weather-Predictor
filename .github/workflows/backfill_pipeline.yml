name: Backfill Pipeline

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD). Leave blank for last 90 days.'
        required: false
        default: ''
      end_date:
        description: 'End date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

jobs:
  run-backfill-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill pipeline
        env:
          AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            ARGS="$ARGS --start-date ${{ github.event.inputs.start_date }}"
          fi
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            ARGS="$ARGS --end-date ${{ github.event.inputs.end_date }}"
          fi
          python pipelines/backfill_pipeline.py $ARGS
